<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestro Cortometraje ❤️</title>



<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:'Poppins',sans-serif;

background:#111;

color:white;

min-height:100vh;

padding:40px 20px;

display:flex;

justify-content:center;

align-items:flex-start;

overflow-y:auto;

position:relative;

}

/* Fondo */

body::before{

content:"";

position:fixed;

inset:0;

background:url("assets/JORGITOBOTELLA.jpg") center center/cover no-repeat;

filter:blur(12px) brightness(.30);

transform:scale(1.08);

z-index:-2;

}

body::after{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.25);

z-index:-1;

}

/* Tarjeta */

.container{

width:100%;

display:flex;

justify-content:center;

}

.card{

width:100%;

max-width:520px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

border-radius:28px;

padding:30px;

box-shadow:0 20px 50px rgba(0,0,0,.45);

margin-bottom:40px;

}

/* Título */

h1{

text-align:center;

font-size:30px;

margin-bottom:12px;

}

.subtitle{

text-align:center;

line-height:1.8;

opacity:.85;

margin-bottom:30px;

}

/* Miniatura */

.thumbnail{

position:relative;

width:100%;

aspect-ratio:16/9;

border-radius:20px;

overflow:hidden;

cursor:pointer;

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.thumbnail img{

width:100%;

height:100%;

object-fit:cover;

display:block;

transition:.4s;

}

.thumbnail:hover img{

transform:scale(1.05);

}

/* Botón Play */

.play-overlay{

position:absolute;

inset:0;

display:flex;

justify-content:center;

align-items:center;

background:rgba(0,0,0,.25);

transition:.3s;

}

.play-overlay i{

font-size:80px;

color:white;

text-shadow:0 0 25px rgba(0,0,0,.5);

transition:.3s;

}

.thumbnail:hover .play-overlay{

background:rgba(0,0,0,.4);

}

.thumbnail:hover .play-overlay i{

transform:scale(1.15);

color:#ff5b7d;

}

/* Información */

.info{

margin-top:25px;

text-align:center;

}

.info h2{

font-size:24px;

margin-bottom:10px;

}

.info p{

opacity:.85;

line-height:1.8;

}

.duration{

margin-top:18px;

color:#ff8aa1;

font-weight:600;

}

/* Responsive */

@media(max-width:600px){

.card{

padding:22px;

}

h1{

font-size:26px;

}

.info h2{

font-size:21px;

}

.play-overlay i{

font-size:60px;

}

}

/*=========================
    VIDEO
=========================*/

.video-container{

    display:none;

    margin-top:25px;

    animation:fade .5s;

}

.video-container video{

    width:100%;

    border-radius:20px;

    display:block;

    background:black;

    box-shadow:0 15px 40px rgba(0,0,0,.45);

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(20px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>

🎬 Nuestro Cortometraje

</h1>

<p class="subtitle">

Una historia que siempre quiero volver a recordar contigo.

</p>

<div class="thumbnail" id="playVideo">

<img
src="assets/flyer expotuning cuenca 2026.jpg"
alt="Miniatura del vídeo">

<div class="play-overlay">

<i class="fa-solid fa-circle-play"></i>

</div>

</div>

<div class="info">

<h2>

Nuestros mejores momentos ❤️

</h2>

<p>

Cada segundo de este vídeo guarda un recuerdo que siempre quiero conservar.

</p>

<div class="duration">

⏱ Duración • 02:34

</div>

</div>

<!-- REPRODUCTOR DE VIDEO -->

<div class="video-container" id="videoContainer">

    <video
        id="video"
        controls
        playsinline
        preload="metadata">

        <source
            src="assets/video.mp4"
            type="video/mp4">

        Tu navegador no soporta video.

    </video>

</div>

</div>

</div>
