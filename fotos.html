<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nuestro Álbum ❤️</title>

<link rel="icon" href="assets/icono.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}
body{

    font-family:Poppins,sans-serif;

    background:#111;

    color:white;

    overflow-y:auto;

}

/* Fondo */

body::before{

content:"";

position:fixed;

inset:0;

background:url("assets/JORGITOBOTELLA.jpg")
center center/cover;

filter:blur(10px)
brightness(.35);

transform:scale(1.1);

z-index:-2;

}

body::after{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.30);

z-index:-1;

}

/* Contenedor */
.container{

    width:min(95%,550px);

    margin:40px auto;

    display:flex;

    justify-content:center;

}

/* Tarjeta */

.album{

    width:100%;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border-radius:30px;

    padding:25px;

    box-shadow:0 20px 50px rgba(0,0,0,.4);

}

/* Título */

h1{

text-align:center;

font-size:34px;

margin-bottom:10px;

}

.subtitle{

text-align:center;

opacity:.8;

line-height:1.8;

margin-bottom:30px;

}

/* Imagen */

.image{

    width:100%;

    border-radius:20px;

    overflow:hidden;

    margin:25px 0;

}

.image img{

    max-height:300px;

}

/* Información */

.info{

margin-top:25px;

}

.info h2{

font-size:28px;

margin-bottom:10px;

}

.info p{

opacity:.9;

line-height:1.8;

}

.date{

margin-top:20px;

color:#ff9fb5;

}

/* Navegación */
.navigation{

display:flex;

justify-content:space-between;

align-items:center;

gap:10px;

margin-top:30px;

flex-wrap:wrap;

}

.btn{ background:#ff4d6d;
flex:1;
min-width:130px;
color:white; 
border:none; 
border-radius:15px; 
padding:15px 20px; 
cursor:pointer; 
font-size:15px; 
font-weight:bold; }


.btn:hover{

    background:#ff2f58;

    transform:translateY(-3px);

}

#counter{

    min-width:70px;

    text-align:center;

    font-weight:bold;

}

/* Responsive */

@media(max-width:600px){

.album{

padding:20px;

}

.image{

height:330px;

}

h1{

font-size:28px;

}

.info h2{

font-size:22px;

}

}

.fade{

    animation:fade .45s;

}

@keyframes fade{

0%{

opacity:0;

transform:scale(.96);

}

100%{

opacity:1;

transform:scale(1);

}

}

</style>

</head>

<body>

<div class="container">

    <div class="album">

        <h1>📸 Nuestro Álbum</h1>

        <p class="subtitle">
            Cada fotografía guarda un momento especial que quiero conservar para siempre contigo.
        </p>

        <!-- FOTO -->
        <div class="image">

            <img id="photo" src="" alt="Nuestro recuerdo">

        </div>

        <!-- INFORMACIÓN -->
        <div class="info">

            <h2 id="title"></h2>

            <p id="description"></p>

            <div class="date" id="date"></div>

        </div>

        <!-- BOTONES -->
        <div class="navigation">

            <button type="button" class="btn" id="prevBtn">

                <i class="fa-solid fa-chevron-left"></i>

                Anterior

            </button>

            <span class="counter" id="counter">

                1 / 1

            </span>

            <button type="button" class="btn" id="nextBtn">

                Siguiente

                <i class="fa-solid fa-chevron-right"></i>

            </button>

        </div>

    </div>

</div>

<script>

const recuerdos = [

{
    imagen:"assets/JORGITOBOTELLA.jpg",
    titulo:"Nuestra primera foto ❤️",
    descripcion:"Aquí comenzó una historia llena de momentos inolvidables.",
    fecha:"📅 15 Enero 2026"
},

{
    imagen:"assets/flyer expotuning cuenca 2026.jpg",
    titulo:"Nuestro primer viaje ✈️",
    descripcion:"Un viaje que siempre recordaré.",
    fecha:"📅 28 Febrero 2026"
}

];

let actual = 0;

const photo = document.getElementById("photo");
const title = document.getElementById("title");
const description = document.getElementById("description");
const date = document.getElementById("date");
const counter = document.getElementById("counter");

const prev = document.getElementById("prevBtn");
const next = document.getElementById("nextBtn");

function cargarFoto(){

    photo.src = recuerdos[actual].imagen;

    title.textContent = recuerdos[actual].titulo;

    description.textContent = recuerdos[actual].descripcion;

    date.textContent = recuerdos[actual].fecha;

    counter.textContent = `${actual + 1} / ${recuerdos.length}`;

}

prev.addEventListener("click",()=>{

    actual--;

    if(actual<0){

        actual=recuerdos.length-1;

    }

    cargarFoto();

});

next.addEventListener("click",()=>{

    actual++;

    if(actual>=recuerdos.length){

        actual=0;

    }

    cargarFoto();

});

cargarFoto();

</script>

</body>


</html>
