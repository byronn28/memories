<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nuestro Álbum ❤️</title>

<link rel="icon" href="assets/icono.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:Poppins,sans-serif;

background:#111;

overflow:hidden;

color:white;

}

/* Fondo */

body::before{

content:"";

position:fixed;

inset:0;

background:url("assets/JORGITOBOTELLA.jpg")
center center/cover;

filter:blur(10px)
brightness(.35);

transform:scale(1.1);

z-index:-2;

}

body::after{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.30);

z-index:-1;

}

/* Contenedor */

.container{

width:min(95%,550px);

margin:auto;

height:100dvh;

display:flex;

justify-content:center;

align-items:center;

}

/* Tarjeta */

.album{

width:100%;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:30px;

padding:30px;

box-shadow:0 20px 50px rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.08);

}

/* Título */

h1{

text-align:center;

font-size:34px;

margin-bottom:10px;

}

.subtitle{

text-align:center;

opacity:.8;

line-height:1.8;

margin-bottom:30px;

}

/* Imagen */

.image{

width:100%;

height:420px;

border-radius:22px;

overflow:hidden;

box-shadow:0 15px 35px rgba(0,0,0,.35);

}

.image img{

width:100%;

height:100%;

object-fit:cover;

display:block;

}

/* Información */

.info{

margin-top:25px;

}

.info h2{

font-size:28px;

margin-bottom:10px;

}

.info p{

opacity:.9;

line-height:1.8;

}

.date{

margin-top:20px;

color:#ff9fb5;

}

/* Navegación */
.navigation{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:15px;

    margin-top:35px;

}

.btn{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    background:#ff4d6d;

    color:white;

    border:none;

    padding:14px 22px;

    border-radius:15px;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.btn:hover{

    background:#ff2f58;

    transform:translateY(-3px);

}

.counter{

    font-size:18px;

    font-weight:bold;

    min-width:70px;

    text-align:center;

}

/* Responsive */

@media(max-width:600px){

.album{

padding:20px;

}

.image{

height:330px;

}

h1{

font-size:28px;

}

.info h2{

font-size:22px;

}

}

.fade{

    animation:fade .45s;

}

@keyframes fade{

0%{

opacity:0;

transform:scale(.96);

}

100%{

opacity:1;

transform:scale(1);

}

}

</style>

</head>

<body>

<div class="container">

<div class="album">

<h1>

📸 Nuestro Álbum

</h1>

<p class="subtitle">

Cada fotografía guarda un momento especial que quiero conservar para siempre contigo.

</p>

<div class="image">

<img
id="photo"
src="assets/foto1.jpg">

</div>

<div class="info">

<h2 id="title">

Nuestra primera foto ❤️

</h2>

<p id="description">

Aquí aparecerá una pequeña historia sobre este momento tan especial.

</p>

<div
class="date"
id="date">

📅 15 Enero 2026

</div>

</div>

<div class="navigation">

    <button class="btn" id="prevBtn">

        <i class="fa-solid fa-chevron-left"></i>

        Anterior

    </button>

    <span class="counter" id="counter">

        1 / 3

    </span>

    <button class="btn" id="nextBtn">

        Siguiente

        <i class="fa-solid fa-chevron-right"></i>

    </button>

</div>

<i class="fa-solid fa-chevron-right"></i>

</div>

</div>

</div>

</div>

<script>

const recuerdos = [

{
imagen:"assets/flyer expotuning cuenca 2026.jpg",
titulo:"Nuestra primera foto ❤️",
descripcion:"Aquí comenzó una historia llena de momentos inolvidables.",
fecha:"📅 15 Enero 2026"
},

{
imagen:"assets/foto2.jpg",
titulo:"Nuestro primer viaje ✈️",
descripcion:"Un viaje que siempre recordaré.",
fecha:"📅 28 Febrero 2026"
}

];

let actual = 0;

const photo = document.getElementById("photo");

const title = document.getElementById("title");

const description = document.getElementById("description");

const date = document.getElementById("date");

const counter = document.getElementById("counter");

const prev = document.getElementById("prevBtn");

const next = document.getElementById("nextBtn");

function cargarFoto(){

    photo.classList.remove("fade");

    void photo.offsetWidth;

    photo.classList.add("fade");

    photo.src = recuerdos[actual].imagen;

    title.textContent = recuerdos[actual].titulo;

    description.textContent = recuerdos[actual].descripcion;

    date.textContent = recuerdos[actual].fecha;

    counter.textContent = (actual+1)+" / "+recuerdos.length;

}

next.onclick=()=>{

    actual++;

    if(actual>=recuerdos.length){

        actual=0;

    }

    cargarFoto();

}

prev.onclick=()=>{

    actual--;

    if(actual<0){

        actual=recuerdos.length-1;

    }

    cargarFoto();

}

cargarFoto();

</script>

</body>


</html>
