<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Una Carta Para Ti ❤️</title>

<link rel="icon" href="assets/icono.png">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:'Poppins',sans-serif;

background:#111;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px 20px;

overflow-y:auto;

position:relative;

}

/* Fondo */

body::before{

content:"";

position:fixed;

inset:0;

background:url("assets/JORGITOBOTELLA.jpg") center center/cover no-repeat;

filter:blur(12px) brightness(.28);

transform:scale(1.08);

z-index:-2;

}

body::after{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.25);

z-index:-1;

}

/* Contenedor */

.container{

width:100%;

display:flex;

justify-content:center;

}

/* Sobre */

.envelope{

width:100%;

max-width:520px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.18);

border-radius:30px;

padding:40px 30px;

box-shadow:0 20px 50px rgba(0,0,0,.45);

text-align:center;

}

/* Icono */

.icon{

width:100px;

height:100px;

margin:auto;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:rgba(255,255,255,.12);

font-size:42px;

color:#ff5d7d;

animation:float 3s ease-in-out infinite;

}

/* Título */

h1{

margin-top:25px;

font-size:34px;

color:white;

}

/* Texto */

.subtitle{

margin-top:18px;

line-height:1.9;

color:rgba(255,255,255,.88);

}

/* Botón */

button{

margin-top:35px;

border:none;

padding:16px 34px;

border-radius:40px;

background:linear-gradient(135deg,#ff5d7d,#ff8da1);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:translateY(-4px);

box-shadow:0 10px 25px rgba(255,93,125,.35);

}

/* Pie */

.footer{

margin-top:30px;

font-size:14px;

opacity:.7;

color:white;

}

/* Responsive */

@media(max-width:600px){

.envelope{

padding:30px 22px;

}

h1{

font-size:28px;

}

.subtitle{

font-size:15px;

line-height:1.8;

}

button{

width:100%;

}

}

/* Animación */

@keyframes float{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

100%{

transform:translateY(0);

}

}

/*=========================
        CARTA
=========================*/

.letter{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;

    align-items:center;

    padding:30px;

    background:rgba(0,0,0,.45);

    backdrop-filter:blur(8px);

    z-index:100;

}

/* Papel */

.paper{

    width:min(850px,95%);

    max-height:90vh;

    overflow-y:auto;

    background:#fdf8ee;

    color:#444;

    border-radius:18px;

    padding:50px;

    box-shadow:0 25px 60px rgba(0,0,0,.45);

    animation:paperAppear .8s;

}

/* Cabecera */

.paper-header{

    text-align:center;

    font-family:'Caveat',cursive;

    font-size:42px;

    color:#d84c6f;

    margin-bottom:40px;

}

/* Texto */

.paper-body{

    font-family:'Caveat',cursive;

    font-size:34px;

    line-height:1.9;

    min-height:300px;

    white-space:pre-wrap;

}

/* Firma */

.signature{

    margin-top:50px;

    text-align:right;

    font-family:'Caveat',cursive;

}

.signature h3{

    font-size:38px;

    color:#c94b6a;

}

.signature span{

    display:block;

    margin-top:10px;

    font-size:24px;

    color:#777;

}

/* Scroll bonito */

.paper::-webkit-scrollbar{

    width:8px;

}

.paper::-webkit-scrollbar-thumb{

    background:#d6c4aa;

    border-radius:20px;

}

/* Responsive */

@media(max-width:600px){

.paper{

    padding:30px;

}

.paper-header{

    font-size:34px;

}

.paper-body{

    font-size:28px;

    line-height:1.8;

}

.signature h3{

    font-size:32px;

}

.signature span{

    font-size:20px;

}

}

/* Animación */

@keyframes paperAppear{

0%{

opacity:0;

transform:scale(.9) translateY(40px);

}

100%{

opacity:1;

transform:scale(1) translateY(0);

}

}

.signature h3,
.signature span{

opacity:0;

}

</style>

</head>

<body>

<div class="container">

<div class="envelope">

<div class="icon">

<i class="fa-solid fa-envelope"></i>

</div>

<h1>

Una Carta Para Ti ❤️

</h1>

<p class="subtitle">

Hay cosas que no siempre se dicen en el momento adecuado.

Por eso decidí escribirlas.

Tómate un instante, abre esta carta y léela con calma.

</p>

<button id="openLetter">

<i class="fa-solid fa-envelope-open"></i>

Abrir carta

</button>

<div class="footer">

Escrita especialmente para ti.

</div>

</div>

</div>
<!-- CARTA -->

<div class="letter" id="letter">

    <div class="paper">

        <div class="paper-header">

            ❤️ Para ti ❤️

        </div>

        <div class="paper-body">

            <p id="typing"></p>

        </div>

        <div class="signature">

            <h3 id="firma"></h3>

            <span id="fecha"></span>

        </div>

    </div>

</div>

<script>

//=============================
// ELEMENTOS
//=============================

const envelope = document.querySelector(".envelope");

const openButton = document.getElementById("openLetter");

const letter = document.getElementById("letter");

const typing = document.getElementById("typing");

const firma = document.getElementById("firma");

const fecha = document.getElementById("fecha");


//=============================
// TU CARTA
//=============================

const texto = `

Querida ❤️,

Aquí puedes escribir todo lo que quieras.

No importa si es una carta larga o corta.

Cada palabra aparecerá poco a poco, como si la estuvieras escribiendo en ese mismo instante.

Puedes dejar párrafos en blanco.

Puedes contar recuerdos.

Puedes agradecer.

Puedes decir lo que sientes.

Y hacer que este sea el rincón más especial de todo el proyecto.

`;

let indice = 0;


//=============================
// EFECTO MÁQUINA DE ESCRIBIR
//=============================

function escribir(){

    if(indice < texto.length){

        typing.textContent += texto.charAt(indice);

        indice++;

        setTimeout(escribir,25);

    }else{

        mostrarFirma();

    }

}


//=============================
// FIRMA
//=============================

function mostrarFirma(){

    firma.style.opacity="0";

    fecha.style.opacity="0";

    firma.textContent="Con todo mi cariño,\nByron ❤️";

    fecha.textContent="Julio 2026";

    setTimeout(()=>{

        firma.style.transition=".8s";

        firma.style.opacity="1";

    },400);

    setTimeout(()=>{

        fecha.style.transition=".8s";

        fecha.style.opacity="1";

    },1200);

}


//=============================
// ABRIR CARTA
//=============================

openButton.onclick=()=>{

    envelope.style.display="none";

    letter.style.display="flex";

    escribir();

}

</script>
</body>
</html>
