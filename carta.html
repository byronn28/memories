<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Una Carta Para Ti ❤️</title>

<link rel="icon"
href="assets/icono.png">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

font-family:'Poppins',sans-serif;

background:#111;

color:white;

min-height:100vh;

padding:40px 20px;

display:flex;

justify-content:center;

align-items:center;

position:relative;

overflow-y:auto;

}

/*==============================
FONDO
==============================*/

body::before{

content:"";

position:fixed;

inset:0;

background:url("assets/JORGITOBOTELLA.jpg")
center center/cover no-repeat;

filter:blur(12px)
brightness(.28);

transform:scale(1.08);

z-index:-2;

}

body::after{

content:"";

position:fixed;

inset:0;

background:rgba(0,0,0,.20);

z-index:-1;

}

/*==============================
CONTENEDOR
==============================*/

.container{

width:100%;

display:flex;

justify-content:center;

}

/*==============================
CARD
==============================*/

.card{

width:100%;

max-width:650px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.18);

border-radius:28px;

padding:30px;

box-shadow:0 20px 45px rgba(0,0,0,.45);

}

/*==============================
TÍTULO
==============================*/

h1{

text-align:center;

font-size:32px;

margin-bottom:12px;

}

.subtitle{

text-align:center;

line-height:1.8;

opacity:.85;

margin-bottom:30px;

}

/*==============================
PAPEL
==============================*/

.paper{

background:#fffaf3;

color:#444;

border-radius:18px;

padding:35px;

box-shadow:0 10px 25px rgba(0,0,0,.18);

cursor:pointer;

transition:.35s;

}

.paper:hover{

transform:translateY(-3px);

}

/* Encabezado del papel */

.paper-title{

font-family:'Caveat',cursive;

font-size:42px;

text-align:center;

color:#d14f73;

margin-bottom:18px;

}

/* Texto inicial */

.paper-start{

font-family:'Caveat',cursive;

font-size:30px;

text-align:center;

color:#666;

line-height:1.8;

padding:35px 0;

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:600px){

.card{

padding:20px;

}

h1{

font-size:27px;

}

.subtitle{

font-size:15px;

}

.paper{

padding:25px;

}

.paper-title{

font-size:34px;

}

.paper-start{

font-size:25px;

}

}

/*==============================
CARTA
==============================*/

.letter-text{

    font-family:'Caveat',cursive;

    font-size:30px;

    line-height:1.8;

    color:#444;

    white-space:pre-wrap;

    margin-top:10px;

}

/* Firma */

.signature{

    margin-top:25px;

    text-align:right;

    font-family:'Caveat',cursive;

}

#firma{

    font-size:34px;

    color:#d14f73;

    opacity:0;

}

#fecha{

    margin-top:6px;

    font-size:22px;

    color:#777;

    opacity:0;

}

/* Cursor */

.cursor{

    display:inline-block;

    width:2px;

    background:#444;

    animation:blink .7s infinite;

    margin-left:2px;

}

@keyframes blink{

0%,50%{

opacity:1;

}

51%,100%{

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>

💌 Una Carta Para Ti

</h1>

<p class="subtitle">

Hay sentimientos que prefiero escribir con calma.
Toca la hoja y deja que las palabras aparezcan poco a poco.

</p>

<div class="paper" id="paper">

    <!-- Pantalla inicial -->
    <div id="welcomePaper">

        <div class="paper-title">

            ❤️ Para Ti ❤️

        </div>

        <div class="paper-start">

            <i class="fa-solid fa-feather-pointed"></i>

            <br><br>

            Toca esta hoja para comenzar a leer...

        </div>

    </div>

    <!-- Carta -->
    <div id="letterContent" style="display:none;">

        <div class="paper-title">

            ❤️ Para Ti ❤️

        </div>

        <div class="letter-text" id="typing"></div>

        <div class="signature">

            <div id="firma"></div>

            <div id="fecha"></div>

        </div>

    </div>

</div>

<script>

//=============================
// ELEMENTOS
//=============================

const paper = document.getElementById("paper");

const welcomePaper = document.getElementById("welcomePaper");

const letterContent = document.getElementById("letterContent");

const typing = document.getElementById("typing");

const firma = document.getElementById("firma");

const fecha = document.getElementById("fecha");


//=============================
// CARTA
//=============================

const carta = `Querida ❤️,

Aquí comenzará tu carta.

Podrás escribir tantos párrafos como quieras.

Cada línea aparecerá poco a poco, haciendo que la lectura sea mucho más especial.

Gracias por formar parte de tantos recuerdos conmigo.

Espero que este pequeño detalle consiga sacarte una sonrisa.

Con cariño...`;

let posicion = 0;

let escribiendo = false;


//=============================
// EFECTO ESCRITURA
//=============================

function escribirCarta(){

    if(posicion < carta.length){

        typing.innerHTML = carta.substring(0,posicion+1) +
        '<span class="cursor"></span>';

        posicion++;

        setTimeout(escribirCarta,30);

    }

    else{

        typing.innerHTML = carta;

        mostrarFirma();

    }

}


//=============================
// FIRMA
//=============================

function mostrarFirma(){

    firma.innerHTML="Byron ❤️";

    fecha.innerHTML="Julio 2026";

    firma.style.transition=".8s";

    fecha.style.transition=".8s";

    firma.style.opacity="1";

    setTimeout(()=>{

        fecha.style.opacity="1";

    },600);

}


//=============================
// ABRIR CARTA
//=============================

paper.addEventListener("click",()=>{

    if(escribiendo) return;

    escribiendo=true;

    welcomePaper.style.display="none";

    letterContent.style.display="block";

    escribirCarta();

});

</script>

</body>
</html>
