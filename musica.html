<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestra Canción ❤️</title>

<link rel="icon" type="image/png" href="https://img.icons8.com/?size=100&id=EatoE3zyvPzJ&format=png&color=000000">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:#111;

    color:white;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    overflow-y:auto;

    padding:40px 20px;

    position:relative;

}

/* Fondo desenfocado */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:url("assets/JORGITOBOTELLA.jpg") center center/cover no-repeat;

    filter:blur(12px) brightness(.30);

    transform:scale(1.1);

    z-index:-2;

}

body::after{

    content:"";

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.25);

    z-index:-1;

}

/* Tarjeta principal */

.player{

    width:92%;

    max-width:420px;

    background:rgba(255,255,255,.10);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:28px;

    padding:30px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

    margin-bottom:40px;

}

h1{

    font-size:30px;

    margin-bottom:10px;

}

.subtitle{

    opacity:.85;

    line-height:1.7;

    margin-bottom:30px;

}

/* FOTO */

.cover{
        background:linear-gradient(

        145deg,

        rgba(255,255,255,.12),

        rgba(0,0,0,.2)

    );

    width:280px;

    height:280px;

    margin:35px auto;

    border-radius:50%;

    overflow:hidden;

    position:relative;

    box-shadow:
        0 15px 40px rgba(0,0,0,.45),
        inset 0 0 25px rgba(255,255,255,.12);

}
    
.cover img{

    width:100%;

    height:100%;

    object-fit:cover;

    border-radius:50%;

    display:block;

}

.cover::after{

    content:"";

    position:absolute;

    width:42px;

    height:42px;

    background:#1b1b1b;

    border-radius:50%;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    border:6px solid rgba(255,255,255,.18);

    box-shadow:0 0 15px rgba(0,0,0,.45);

}

.cover::before{

    content:"";

    position:absolute;

    inset:0;

    border-radius:50%;

    background:

    repeating-radial-gradient(

        circle,

        rgba(255,255,255,.03) 0px,

        rgba(255,255,255,.03) 2px,

        transparent 3px,

        transparent 8px

    );

}

/*==========================
  INFORMACIÓN DE LA CANCIÓN
==========================*/

.music-info{

    margin-top:25px;

}

.music-info h2{

    font-size:28px;

    font-weight:600;

    margin-bottom:8px;

}

.music-info p{

    font-size:16px;

    color:rgba(255,255,255,.75);

}

/*==========================
    BARRA DE PROGRESO
==========================*/

.progress-container{

    margin-top:30px;

}

.progress-bar{

    width:100%;

    height:6px;

    background:rgba(255,255,255,.20);

    border-radius:30px;

    overflow:hidden;

    margin:12px 0;

}

.progress{

    width:0%;

    height:100%;

    background:linear-gradient(90deg,#ff4d6d,#ff8aa1);

    border-radius:30px;

    transition:.15s linear;

}

.progress-container span{

    font-size:14px;

    color:rgba(255,255,255,.8);

}

.progress-container{

    display:grid;

    grid-template-columns:45px 1fr 45px;

    align-items:center;

    gap:12px;

}

/*==========================
      CONTROLES
==========================*/

.controls{

    margin-top:35px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:25px;

}

/* Botones laterales */

.controls button{

    border:none;

    background:rgba(255,255,255,.12);

    color:white;

    width:55px;

    height:55px;

    border-radius:50%;

    cursor:pointer;

    transition:.3s;

    font-size:18px;

    backdrop-filter:blur(8px);

}

/* Botón Play */

#play{

    width:78px;

    height:78px;

    background:linear-gradient(135deg,#ff4d6d,#ff758f);

    font-size:28px;

    box-shadow:0 10px 25px rgba(255,77,109,.45);

}

/* Hover */

.controls button:hover{

    transform:translateY(-4px) scale(1.05);

}

#play:hover{

    transform:scale(1.08);

}

/*==========================
     PORTADA
==========================*/

.cover{

    transition:.4s;

}

.cover img{

    transition:.4s;

}

/* Cuando la música esté sonando */

.playing{

    animation:spin 15s linear infinite;

}

@media(max-width:600px){

    h1{

        font-size:26px;

    }

    .subtitle{

        font-size:14px;

    }

    .music-info h2{

        font-size:24px;

    }

    .controls{

        gap:15px;

    }

    #play{

        width:70px;

        height:70px;

        font-size:24px;

    }

    .controls button{

        width:50px;

        height:50px;

    }

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

</style>

</head>

<body>

<div class="player">

    <h1>
        ❤️ UNA CANCIÒN PARA TI, PENSADA EN TI 🎶
    </h1>

    <p class="subtitle">
        Por que hay canciones que
        me recuerdan a ti.
    </p>

    <div class="cover">

        <img
        id="cover"
        src="assets/flyer expotuning cuenca 2026.jpg"
        alt="Nuestra Foto">

    </div>
      <!-- INFORMACIÓN DE LA CANCIÓN -->

    <div class="music-info">

        <h2 id="songTitle">

            Yerbatero

        </h2>

        <p id="artist">

            Juanes

        </p>

    </div>

    <!-- BARRA DE PROGRESO -->

    <div class="progress-container">

        <span id="currentTime">

            0:00

        </span>

        <div class="progress-bar">

            <div class="progress" id="progress"></div>

        </div>

        <span id="duration">

            0:00

        </span>

    </div>

    <!-- CONTROLES -->

    <div class="controls">

        <button id="prev">

            <i class="fa-solid fa-backward"></i>

        </button>

        <button id="play">

            <i class="fa-solid fa-play"></i>

        </button>

        <button id="next">

            <i class="fa-solid fa-forward"></i>

        </button>

    </div>

    <!-- AUDIO -->

    <audio id="audio">

        <source src="assets/musica.mp3" type="audio/mpeg">

    </audio>

</div>
  <script>

//============================
// ELEMENTOS
//============================

const audio = document.getElementById("audio");

const playBtn = document.getElementById("play");

const playIcon = playBtn.querySelector("i");

const cover = document.getElementById("cover");

const progress = document.getElementById("progress");

const progressBar = document.querySelector(".progress-bar");

const currentTime = document.getElementById("currentTime");

const duration = document.getElementById("duration");


//============================
// PLAY / PAUSA
//============================

playBtn.addEventListener("click",()=>{

    if(audio.paused){

        audio.play();

    }else{

        audio.pause();

    }

});


//============================
// CUANDO EMPIEZA
//============================

audio.addEventListener("play",()=>{

    playIcon.classList.remove("fa-play");

    playIcon.classList.add("fa-pause");

    cover.classList.add("playing");

});


//============================
// CUANDO SE PAUSA
//============================

audio.addEventListener("pause",()=>{

    playIcon.classList.remove("fa-pause");

    playIcon.classList.add("fa-play");

    cover.classList.remove("playing");

});


//============================
// FORMATO DEL TIEMPO
//============================

function formato(segundos){

    const min = Math.floor(segundos/60);

    const sec = Math.floor(segundos%60);

    return `${min}:${sec.toString().padStart(2,"0")}`;

}


//============================
// DURACIÓN
//============================

audio.addEventListener("loadedmetadata",()=>{

    duration.textContent = formato(audio.duration);

});


//============================
// ACTUALIZAR BARRA
//============================

audio.addEventListener("timeupdate",()=>{

    const porcentaje =

    (audio.currentTime/audio.duration)*100;

    progress.style.width = porcentaje+"%";

    currentTime.textContent = formato(audio.currentTime);

});


//============================
// ADELANTAR CANCIÓN
//============================

progressBar.addEventListener("click",(e)=>{

    const ancho = progressBar.clientWidth;

    const click = e.offsetX;

    audio.currentTime =

    (click/ancho)*audio.duration;

});


//============================
// TERMINA LA CANCIÓN
//============================

audio.addEventListener("ended",()=>{

    playIcon.classList.remove("fa-pause");

    playIcon.classList.add("fa-play");

    cover.classList.remove("playing");

    progress.style.width="0%";

    currentTime.textContent="0:00";

});

</script>

</body>

</html>
