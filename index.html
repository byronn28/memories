<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestros Recuerdos ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:400px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.heart{
    font-size:55px;
    animation:latido 1.5s infinite;
}

@keyframes latido{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

h1{
    margin-top:15px;
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:15px;
    background:rgba(255,255,255,.1);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.2);
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="heart">❤️</div>

        <h1>Nuestros Recuerdos</h1>

        <p>
            He guardado aquí algunos momentos especiales.
        </p>

        <a class="btn" href="https://spotify.com" target="_blank">
            🎵 Nuestra canción
        </a>

        <a class="btn" href="#">
            📷 Nuestras fotos
        </a>

        <a class="btn" href="#">
            💌 Una carta
        </a>

        <a class="btn" href="#">
            🎥 Nuestro video
        </a>

        <a class="btn" href="#">
            📍 Nuestro lugar especial
        </a>

        <a class="btn" href="#">
            🎁 Sorpresa
        </a>

    </div>
</div>

</body>
</html>
